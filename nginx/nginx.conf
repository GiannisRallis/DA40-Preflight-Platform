# DA40 Platform — Nginx Reverse Proxy
# Routes: /api/auth/v1/ → GoTrue | /api/rest/v1/ → PostgREST | / → Next.js

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    client_max_body_size 10M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=120r/m;

    # Upstream services
    upstream gotrue    { server gotrue:9999;    }
    upstream postgrest { server postgrest:3000; }
    upstream nextjs    { server nextjs:3000;    }

    server {
        listen 80 default_server;
        server_name _;

        # ── GoTrue: /api/auth/v1/* ─────────────────────────────
        # Supabase JS client calls: /api/auth/v1/signup, /token, etc.
        location /api/auth/v1/ {
            limit_req zone=auth burst=20 nodelay;

            # CORS — allow browser requests from localhost
            add_header Access-Control-Allow-Origin  $http_origin always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,apikey,X-Client-Info,X-Supabase-Api-Version" always;
            add_header Access-Control-Allow-Credentials true always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $http_origin;
                add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization,Content-Type,apikey,X-Client-Info,X-Supabase-Api-Version";
                add_header Access-Control-Allow-Credentials true;
                add_header Content-Length 0;
                return 204;
            }

            # Strip /api/auth/v1 prefix — GoTrue expects requests at /
            rewrite ^/api/auth/v1/(.*) /$1 break;
            proxy_pass         http://gotrue;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
            proxy_read_timeout 60s;
        }

        # ── PostgREST: /api/rest/v1/* ──────────────────────────
        # Supabase JS client calls: /api/rest/v1/profiles, etc.
        location /api/rest/v1/ {
            limit_req zone=api burst=50 nodelay;

            add_header Access-Control-Allow-Origin  $http_origin always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,apikey,Prefer,Range,X-Client-Info" always;
            add_header Access-Control-Allow-Credentials true always;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $http_origin;
                add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization,Content-Type,apikey,Prefer,Range,X-Client-Info";
                add_header Access-Control-Allow-Credentials true;
                add_header Content-Length 0;
                return 204;
            }

            # Strip /api/rest/v1 prefix — PostgREST expects requests at /
            rewrite ^/api/rest/v1/(.*) /$1 break;
            proxy_pass         http://postgrest;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }

        # ── Next.js: all other routes ──────────────────────────
        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade     $http_upgrade;
            proxy_set_header   Connection  "upgrade";
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_redirect     off;
        }

        # Cache Next.js static assets
        location /_next/static/ {
            proxy_pass   http://nextjs;
            add_header   Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
